<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disney Cruise Tracker</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Disney Cruise Line</p>
          <h1>Live fleet tracker</h1>
        </div>
        <div class="status-panel">
          <div class="status-row">
            <span>Feed status</span>
            <strong id="feed-status">Loading</strong>
          </div>
          <div class="status-row">
            <span>Last update</span>
            <strong id="feed-updated">Waiting</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-map is-active" data-view="map">
          <div class="map-toolbar">
            <div>
              <h2>Map</h2>
              <p>Tap markers or choose a ship from the fleet drawer.</p>
            </div>
            <button id="fleet-toggle" class="drawer-toggle" type="button" aria-expanded="true" aria-controls="fleet-drawer">
              Hide fleet
            </button>
          </div>
          <div id="map"></div>
          <aside id="fleet-drawer" class="fleet-drawer" aria-label="Disney Cruise Line fleet">
            <div class="drawer-header">
              <div>
                <h2>Fleet</h2>
                <p id="fleet-summary">Polling AISStream every minute…</p>
              </div>
            </div>
            <div id="ship-list" class="ship-list"></div>
          </aside>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
