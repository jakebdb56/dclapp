name: Warm Disney Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --omit=dev --no-package-lock

      - name: Warm cached ship snapshot
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          VESSELFINDER_DETAILS_USER_AGENT: ${{ secrets.VESSELFINDER_DETAILS_USER_AGENT }}
        run: |
          if [ -z "$UPSTASH_REDIS_REST_URL$KV_REST_API_URL" ]; then
            echo "::error::Missing Redis REST URL secret. Add UPSTASH_REDIS_REST_URL or KV_REST_API_URL in GitHub Actions secrets."
            exit 1
          fi

          if [ -z "$UPSTASH_REDIS_REST_TOKEN$KV_REST_API_TOKEN" ]; then
            echo "::error::Missing Redis REST token secret. Add UPSTASH_REDIS_REST_TOKEN or KV_REST_API_TOKEN in GitHub Actions secrets."
            exit 1
          fi

          node --input-type=module -e '
            import { refreshAndCacheSnapshot } from "./lib/snapshot-service.js";

            const result = await refreshAndCacheSnapshot({
              attempts: 1,
              timeoutMs: 9000
            });

            const summary = {
              status: result.snapshot.connection.status,
              lastError: result.snapshot.connection.lastError,
              shipsWithPositions: result.snapshot.ships.filter((ship) => ship.latitude !== null && ship.longitude !== null).length,
              shipsWithDestinations: result.snapshot.ships.filter((ship) => ship.destination).length,
              writeAttempted: result.cacheDebug.writeAttempted,
              writeSucceeded: result.cacheDebug.writeSucceeded,
              cacheEnvFamily: result.cacheDebug.envFamily,
              cacheLastError: result.cacheDebug.lastError
            };

            console.log(JSON.stringify(summary, null, 2));

            if (!result.cacheDebug.writeSucceeded) {
              if (!result.cacheDebug.writeAttempted) {
                console.error(`::error::Cache write was not attempted. Scrape status: ${summary.status}. Scrape error: ${summary.lastError || "none"}. Ships with positions: ${summary.shipsWithPositions}. Ships with destinations: ${summary.shipsWithDestinations}.`);
              } else {
                console.error(`::error::Cache write failed. Cache env: ${summary.cacheEnvFamily}. Cache error: ${summary.cacheLastError || "none"}.`);
              }

              process.exitCode = 1;
            }
          '
