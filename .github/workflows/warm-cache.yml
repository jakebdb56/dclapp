name: Warm Disney Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Warm cached ship snapshot
        env:
          REFRESH_URL: ${{ secrets.DCL_REFRESH_URL }}
          CRON_SECRET: ${{ secrets.DCL_CRON_SECRET }}
        run: |
          if [ -z "$REFRESH_URL" ]; then
            echo "Missing DCL_REFRESH_URL secret"
            exit 1
          fi

          if [ -n "$CRON_SECRET" ]; then
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$REFRESH_URL"
          else
            curl --fail --silent --show-error "$REFRESH_URL"
          fi
